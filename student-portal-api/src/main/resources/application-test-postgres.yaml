spring:
  autoconfigure:
    exclude:
  datasource:
    url: ${POSTGRES_JDBC_URL:jdbc:postgresql://localhost:5432/student_portal_test}
    username: ${POSTGRES_USER:student_portal}
    password: ${POSTGRES_PASSWORD:student_portal_dev}
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    hibernate:
      # Entity/schema validation is enabled by the local profile once the
      # complete adapter mappings are in place; this foundation test focuses
      # on Flyway applying the relational schema.
      ddl-auto: none
  flyway:
    enabled: true
