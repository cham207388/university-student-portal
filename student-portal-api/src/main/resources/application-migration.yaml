spring:
  datasource:
    url: ${POSTGRES_JDBC_URL:jdbc:postgresql://localhost.localstack.cloud:4510/student_portal}
    username: ${POSTGRES_USER:student_portal}
    password: ${POSTGRES_PASSWORD:student_portal_local}
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true

student-portal:
  dynamodb:
    region: ${AWS_REGION:us-east-1}
    endpoint: ${DYNAMODB_ENDPOINT:http://localhost:4566}
    tables:
      departments: ${DYNAMODB_DEPARTMENTS_TABLE:student-portal-departments}
      students: ${DYNAMODB_STUDENTS_TABLE:student-portal-students}
      student-profiles: ${DYNAMODB_STUDENT_PROFILES_TABLE:student-portal-student-profiles}
      instructors: ${DYNAMODB_INSTRUCTORS_TABLE:student-portal-instructors}
      courses: ${DYNAMODB_COURSES_TABLE:student-portal-courses}
      enrollments: ${DYNAMODB_ENROLLMENTS_TABLE:student-portal-enrollments}

migration:
  run: ${MIGRATION_RUN:false}
  dry-run: ${MIGRATION_DRY_RUN:false}
  batch-size: ${MIGRATION_BATCH_SIZE:100}
