name: student-portal

services:
  localstack:
    image: localstack/localstack-pro:4.14.0
    container_name: student-portal-localstack
    ports:
      - "127.0.0.1:4566:4566"
    environment:
      LOCALSTACK_AUTH_TOKEN: ${LOCALSTACK_AUTH_TOKEN}
      SERVICES: dynamodb
      DEBUG: ${LOCALSTACK_DEBUG:-0}
      PERSISTENCE: "1"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:4566/_localstack/health"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    volumes:
      - localstack-data:/var/lib/localstack
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - student-portal-network

  postgres:
    image: postgres:17-alpine
    container_name: student-portal-postgres
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-student_portal}
      POSTGRES_USER: ${POSTGRES_USER:-student_portal}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-student_portal_dev}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - student-portal-network

volumes:
  localstack-data:
  postgres-data:

networks:
  student-portal-network:
    name: student-portal-network
